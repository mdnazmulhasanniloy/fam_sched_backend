services:
  app:
    image: nazmulhasn/fam_sched_app:latest
    container_name: fam_sched_app
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_HOST=fam_sched_redis
      - REDIS_PORT=6379
    ports:
      - '2000:2000'
      - '2005:2005'
    depends_on:
      - redis
      - mongo
    # ❌ REMOVE THIS LINE:
    # command: ['node', 'dist/server.js']

  ai:
    build: ./ai_server
    container_name: fam_sched_ai
    ports:
      - '2007:2007'
    env_file:
      - .env
    restart: always
    volumes:
      - /etc/localtime:/etc/localtime:ro

  redis:
    image: redis:7.2-alpine
    container_name: fam_sched_redis
    ports:
      - '6777:6379'
    volumes:
      - redis-data:/data
    restart: always
    command: ['redis-server', '--appendonly', 'yes']

  mongo:
    image: mongo:7.0
    container_name: fam_sched_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]

  mongo-init:
    image: mongo:7.0
    depends_on:
      - mongo
    restart: "no"
    entrypoint: >
      bash -c "
      sleep 5 &&
      mongosh --host mongo:27017 --eval '
        rs.initiate({
          _id: \"rs0\",
          members: [{ _id: 0, host: \"mongo:27017\" }]
        })
      '
      "


volumes:
  redis-data:
  mongo-data:
